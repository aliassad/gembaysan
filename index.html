<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tags -->
    <title>Gem Baysan | Cybersecurity & Infrastructure Project Manager</title>
    <meta name="description" content="Official website of Gem Baysan, a PMP-certified Cybersecurity and Infrastructure Project Manager based in Vancouver, BC with 27+ years of IT experience.">
    
    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-indigo: #4f46e5;
            --brand-slate: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Smooth Reveal System */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Glossy Mesh Gradient Background */
        .mesh-bg {
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(231,100%,98%,1) 0, transparent 40%), 
                radial-gradient(at 100% 0%, hsla(220,100%,96%,1) 0, transparent 40%),
                radial-gradient(at 100% 100%, hsla(240,100%,99%,1) 0, transparent 40%),
                radial-gradient(at 0% 100%, hsla(230,100%,98%,1) 0, transparent 40%);
        }

        /* Glassmorphism Styles */
        .glass-nav {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }

        /* Advanced Typography */
        .text-gradient {
            background: linear-gradient(to right, #0f172a, #334155, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animated Loading Bar */
        #preloader {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .loader-progress {
            width: 150px;
            height: 2px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background: #4f46e5;
            transition: width 0.4s ease;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        /* Mobile Menu Animation */
        .mobile-menu-overlay {
            clip-path: circle(0% at 100% 0%);
            transition: clip-path 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mobile-menu-overlay.open {
            clip-path: circle(150% at 100% 0%);
        }
    </style>
</head>
<body class="mesh-bg">
    <div id="preloader">
        <div class="text-2xl font-black text-slate-900 tracking-tighter">GB<span class="text-indigo-600">.</span></div>
        <div class="loader-progress"><div class="loader-fill" id="loader-fill"></div></div>
    </div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                // Preloader Logic
                const fill = document.getElementById('loader-fill');
                const loader = document.getElementById('preloader');
                if (fill) fill.style.width = '100%';
                
                setTimeout(() => {
                    if (loader) {
                        loader.style.opacity = '0';
                        loader.style.visibility = 'hidden';
                    }
                }, 800);

                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 30);
                    document.querySelectorAll(".reveal").forEach(el => {
                        const rect = el.getBoundingClientRect();
                        if (rect.top < window.innerHeight * 0.9) el.classList.add("active");
                    });
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const NavItem = ({ label, href }) => (
                <a 
                    href={href} 
                    className="text-sm font-semibold text-slate-600 hover:text-indigo-600 transition-all px-2 py-1"
                >
                    {label}
                </a>
            );

            return (
                <div className="min-h-screen">
                    {/* --- Re-imagined Modern Nav --- */}
                    <nav className={`fixed top-0 left-0 right-0 z-[100] transition-all duration-500 flex justify-center ${
                        isScrolled ? 'pt-4 px-4' : 'pt-6 md:pt-10 px-6'
                    }`}>
                        <div className={`w-full max-w-5xl flex items-center justify-between transition-all duration-500 ${
                            isScrolled 
                            ? 'glass-nav rounded-2xl px-6 py-3 shadow-2xl shadow-indigo-900/5' 
                            : 'bg-transparent py-2'
                        }`}>
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg">G</div>
                                <span className="font-extrabold text-xl text-slate-900 tracking-tighter">
                                    Gem Baysan<span className="text-indigo-600">.</span>
                                </span>
                            </div>

                            {/* Desktop Desktop Links */}
                            <div className="hidden md:flex items-center gap-8">
                                {['About', 'Profile', 'Projects'].map(item => (
                                    <NavItem key={item} label={item} href={`#${item.toLowerCase()}`} />
                                ))}
                                <a 
                                    href="#contact" 
                                    className="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-indigo-600 hover:scale-[1.03] active:scale-95 transition-all shadow-xl shadow-slate-900/10"
                                >
                                    Work with me
                                </a>
                            </div>

                            {/* Mobile Menu Toggle */}
                            <button 
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                className="md:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-slate-900 text-white shadow-lg active:scale-90 transition-transform"
                            >
                                <Icon name={mobileMenuOpen ? "x" : "menu"} size={20} />
                            </button>
                        </div>
                    </nav>

                    {/* --- Mobile Menu Overlay --- */}
                    <div className={`fixed inset-0 z-[90] bg-white/95 backdrop-blur-xl md:hidden mobile-menu-overlay ${mobileMenuOpen ? 'open' : ''}`}>
                        <div className="h-full flex flex-col items-center justify-center gap-8 p-6 text-center">
                            {['Home', 'About', 'Profile', 'Projects'].map((item, i) => (
                                <a 
                                    key={item} 
                                    href={`#${item.toLowerCase()}`} 
                                    onClick={() => setMobileMenuOpen(false)}
                                    className="text-4xl font-black text-slate-900 tracking-tighter hover:text-indigo-600 transition-colors"
                                    style={{ transitionDelay: `${i * 100}ms` }}
                                >
                                    {item}
                                </a>
                            ))}
                            <a 
                                href="#contact"
                                onClick={() => setMobileMenuOpen(false)}
                                className="mt-4 px-10 py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-2xl shadow-indigo-600/30"
                            >
                                Hire Me
                            </a>
                        </div>
                    </div>

                    {/* --- Hero Section --- */}
                    <section id="home" className="relative min-h-screen flex items-center px-6 pt-20 overflow-hidden">
                        {/* Abstract Background Decoration */}
                        <div className="absolute top-1/4 -right-20 w-[40rem] h-[40rem] bg-indigo-100/30 rounded-full blur-[120px] pointer-events-none"></div>
                        <div className="absolute -bottom-20 -left-20 w-[30rem] h-[30rem] bg-blue-50/40 rounded-full blur-[100px] pointer-events-none"></div>
                        
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 lg:gap-20 items-center w-full">
                            <div className="relative z-10 space-y-10 reveal active">
                                <div className="inline-flex items-center gap-3 px-4 py-2 rounded-2xl glass-card border-white text-indigo-700 text-[10px] md:text-xs font-black uppercase tracking-[0.2em]">
                                    <span className="flex h-2 w-2 rounded-full bg-indigo-500 shadow-[0_0_12px_rgba(79,70,229,0.5)]"></span>
                                    Vancouver Based & Global Excellence
                                </div>
                                
                                <h1 className="text-5xl sm:text-7xl md:text-8xl lg:text-9xl font-black tracking-tighter leading-[0.95] text-gradient">
                                    Strategic <br/> IT Systems <br/> Leader.
                                </h1>
                                
                                <p className="text-lg md:text-2xl text-slate-500 font-medium max-w-xl leading-relaxed">
                                    PMP® Certified Cybersecurity & Infrastructure Project Manager. Driving high-stakes transformation for 27+ years.
                                </p>
                                
                                <div className="flex flex-col sm:flex-row items-center gap-4 pt-4">
                                    <a href="#contact" className="w-full sm:w-auto px-10 py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-2xl shadow-slate-900/20 hover:bg-indigo-600 hover:-translate-y-1 active:translate-y-0 transition-all flex items-center justify-center gap-3">
                                        Let's Build Together <Icon name="arrow-right" size={20} />
                                    </a>
                                    <div className="w-full sm:w-auto px-8 py-5 glass-card rounded-2xl font-bold text-slate-700 flex items-center justify-center gap-3">
                                        <Icon name="shield-check" className="text-indigo-500" /> Infrastructure Security
                                    </div>
                                </div>

                                <div className="flex items-center gap-8 pt-6 opacity-60">
                                    <div className="flex flex-col">
                                        <span className="text-2xl font-black text-slate-900">27+</span>
                                        <span className="text-[10px] font-bold uppercase tracking-widest">Years Experience</span>
                                    </div>
                                    <div className="w-px h-10 bg-slate-200"></div>
                                    <div className="flex flex-col">
                                        <span className="text-2xl font-black text-slate-900">100+</span>
                                        <span className="text-[10px] font-bold uppercase tracking-widest">Global Projects</span>
                                    </div>
                                </div>
                            </div>

                            <div className="relative reveal active hidden lg:block" style={{ transitionDelay: '0.3s' }}>
                                <div className="relative animate-float">
                                    {/* Design Elements */}
                                    <div className="absolute -top-12 -left-12 w-24 h-24 bg-indigo-600/10 rounded-3xl rotate-12 -z-10"></div>
                                    <div className="absolute -bottom-8 -right-8 w-40 h-40 bg-slate-900/5 rounded-full -z-10"></div>
                                    
                                    <div className="relative glass-card p-5 rounded-[3.5rem] shadow-[0_40px_100px_-15px_rgba(0,0,0,0.1)]">
                                        <img 
                                            src="profile.jpeg" 
                                            alt="Professional Portrait" 
                                            className="w-full h-[600px] object-cover rounded-[2.8rem] shadow-inner"
                                        />
                                        
                                        {/* Floating Badge */}
                                        <div className="absolute -bottom-6 -left-6 glass-card p-6 rounded-3xl shadow-2xl animate-bounce-slow">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                                    <Icon name="award" size={24} />
                                                </div>
                                                <div>
                                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest">Credentials</p>
                                                    <p className="text-lg font-black text-slate-900">PMP® Certified</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* --- Expertise Section --- */}
                    <section id="about" className="py-24 md:py-32 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-16 reveal">
                                <span className="text-indigo-600 font-bold uppercase tracking-[0.3em] text-xs mb-3 block">Expertise Profile</span>
                                <h2 className="text-4xl md:text-6xl font-black text-slate-900 tracking-tight">The Professional <br/> Advantage.</h2>
                                <div className="h-2 w-24 bg-indigo-600 mt-8 rounded-full"></div>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { 
                                        icon: "lock", 
                                        title: "Cyber Security", 
                                        desc: "Building immutable security frameworks that align with ISO, NIST, and SOC2 compliance standards." 
                                    },
                                    { 
                                        icon: "cloud", 
                                        title: "Cloud & Infrastructure", 
                                        desc: "Modernizing legacy stacks into high-availability hybrid environments with zero business disruption." 
                                    },
                                    { 
                                        icon: "briefcase", 
                                        title: "Project Delivery", 
                                        desc: "Applying rigorous PMP methodologies to ensure complex global projects are on-time and within budget." 
                                    }
                                ].map((item, i) => (
                                    <div key={i} className="reveal glass-card p-10 rounded-[2.5rem] group hover:bg-slate-900 transition-all duration-500" style={{ transitionDelay: `${i * 100}ms` }}>
                                        <div className="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-8 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-sm">
                                            <Icon name={item.icon} size={28} />
                                        </div>
                                        <h3 className="text-2xl font-bold text-slate-900 mb-4 group-hover:text-white transition-colors">{item.title}</h3>
                                        <p className="text-slate-500 leading-relaxed group-hover:text-slate-400 transition-colors">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* --- Bottom Contact CTA --- */}
                    <section id="contact" className="py-24 px-6">
                        <div className="max-w-5xl mx-auto reveal text-center">
                            <h2 className="text-5xl md:text-8xl font-black text-slate-900 mb-8 tracking-tighter">Ready for <br/> Impact?</h2>
                            <p className="text-xl text-slate-500 mb-16 max-w-2xl mx-auto font-medium leading-relaxed">
                                Available for executive consulting, leadership roles, and strategic project management worldwide.
                            </p>
                            
                            <div className="flex flex-col md:flex-row gap-6 justify-center items-center">
                                <a href="mailto:contact@gembaysan.com" className="w-full md:w-auto group glass-card px-10 py-7 rounded-[2rem] flex items-center justify-between gap-10 hover:bg-slate-900 transition-all border-none shadow-2xl">
                                    <div className="text-left">
                                        <p className="text-[10px] uppercase font-black text-slate-400 group-hover:text-indigo-400">Direct Contact</p>
                                        <p className="text-xl font-black text-slate-900 group-hover:text-white">Email Gem</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-indigo-600 text-white flex items-center justify-center">
                                        <Icon name="mail" size={24} />
                                    </div>
                                </a>
                                <a href="#" className="w-full md:w-auto group glass-card px-10 py-7 rounded-[2rem] flex items-center justify-between gap-10 hover:bg-slate-900 transition-all border-none shadow-2xl">
                                    <div className="text-left">
                                        <p className="text-[10px] uppercase font-black text-slate-400 group-hover:text-indigo-400">Social Network</p>
                                        <p className="text-xl font-black text-slate-900 group-hover:text-white">LinkedIn Profile</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-indigo-600 text-white flex items-center justify-center">
                                        <Icon name="linkedin" size={24} />
                                    </div>
                                </a>
                            </div>

                            <footer className="mt-32 pt-12 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6 text-slate-400 font-bold text-[10px] uppercase tracking-widest">
                                <div>&copy; {new Date().getFullYear()} Gem Baysan. Vancouver, BC.</div>
                                <div className="flex gap-8">
                                    <a href="#home" className="hover:text-slate-900 transition-colors">Home</a>
                                    <a href="#about" className="hover:text-slate-900 transition-colors">Experience</a>
                                    <a href="#profile" className="hover:text-slate-900 transition-colors">Profile</a>
                                </div>
                            </footer>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
