<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tags -->
    <title>Gem Baysan | Cybersecurity & Infrastructure Project Manager</title>
    <meta name="description" content="Official website of Gem Baysan, a PMP-certified Cybersecurity and Infrastructure Project Manager based in Vancouver, BC with 27+ years of IT experience.">
    <meta name="keywords" content="Gem Baysan, Gem Baysan cybersecurity, Gem Baysan infrastructure project manager, PMP, Vancouver BC, IT Project Manager">
    
    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased selection:bg-indigo-100 scroll-smooth">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- Icon Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Curve Divider ---
        const Curve = ({ topColor, bottomColor, inverted = false }) => (
            <div className={`w-full ${topColor} leading-none -mb-1 relative z-10`}>
                <svg 
                    className={`block w-full h-12 md:h-24 ${inverted ? 'rotate-180' : ''}`} 
                    viewBox="0 0 1440 320" 
                    preserveAspectRatio="none"
                >
                    <path
                        fill={bottomColor}
                        d="M0,160L48,176C96,192,192,224,288,224C384,224,480,192,576,165.3C672,139,768,117,864,122.7C960,128,1056,160,1152,165.3C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"
                    ></path>
                </svg>
            </div>
        );

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                    
                    const reveals = document.querySelectorAll(".reveal");
                    reveals.forEach(reveal => {
                        const windowHeight = window.innerHeight;
                        const revealTop = reveal.getBoundingClientRect().top;
                        const revealPoint = 150;
                        if (revealTop < windowHeight - revealPoint) {
                            reveal.classList.add("active");
                        }
                    });
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll(); // Initial check
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="relative">
                    {/* --- Navigation --- */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${
                        isScrolled ? 'py-3 bg-white/80 backdrop-blur-lg shadow-lg border-b border-slate-100' : 'py-6 bg-transparent'
                    }`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2 group cursor-pointer">
                                <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold group-hover:bg-indigo-600 transition-colors duration-300">G</div>
                                <span className="text-xl font-bold tracking-tight text-slate-900">
                                    Gem Baysan<span className="text-indigo-600">.</span>
                                </span>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-10">
                                {['About', 'Profile', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-sm font-semibold text-slate-600 hover:text-indigo-600 transition-colors relative group">
                                        {item}
                                        <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-indigo-600 transition-all duration-300 group-hover:w-full"></span>
                                    </a>
                                ))}
                                <a href="#contact" className="bg-slate-900 text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-indigo-600 transition-all shadow-md">
                                    Hire Me
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* --- Hero Section --- */}
                    <section id="home" className="relative pt-40 pb-20 px-6 overflow-hidden min-h-screen flex items-center">
                        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                        
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-16 w-full relative z-10">
                            <div className="flex-1 animate-in fade-in slide-in-from-left duration-1000">
                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs font-bold uppercase tracking-wider mb-6">
                                    <span className="relative flex h-2 w-2">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                                    </span>
                                    Available for Global Projects
                                </div>
                                <h1 className="text-5xl md:text-8xl font-black text-slate-900 tracking-tight mb-6 leading-[1.1]">
                                    Strategic IT <br/>
                                    <span className="text-indigo-600">Leadership.</span>
                                </h1>
                                <p className="text-xl md:text-2xl text-slate-500 font-medium mb-10 max-w-xl leading-relaxed">
                                    Cybersecurity & Infrastructure Project Manager with 27+ years experience driving digital transformation.
                                </p>
                                <div className="flex flex-col sm:flex-row items-center gap-5">
                                    <a href="#contact" className="w-full sm:w-auto bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-indigo-600 transition-all shadow-xl flex items-center justify-center gap-2">
                                        Start a Conversation <Icon name="chevron-right" size={18} />
                                    </a>
                                    <div className="flex items-center gap-4 text-slate-400 font-medium font-bold">
                                        <Icon name="map-pin" size={20} className="text-indigo-500" />
                                        Vancouver, BC
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex-1 relative animate-in fade-in zoom-in duration-1000">
                                <div className="relative group">
                                    <div className="absolute -inset-4 bg-gradient-to-tr from-indigo-500 to-blue-400 rounded-[2rem] blur-2xl opacity-20 transition duration-1000"></div>
                                    <div className="relative bg-white p-4 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                                        <img 
                                            src="profile.jpeg" 
                                            alt="Gem Baysan Portfolio" 
                                            className="w-full h-[500px] object-cover rounded-[2rem]"
                                        />
                                        <div className="absolute bottom-8 left-8 right-8 bg-white/80 backdrop-blur-md p-6 rounded-2xl border border-white/50 shadow-xl">
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <p className="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-1">Positioning</p>
                                                    <p className="text-lg font-bold text-slate-900">Expert Consultant</p>
                                                </div>
                                                <div className="flex -space-x-2">
                                                    {[1,2,3].map(i => (
                                                        <div key={i} className="w-8 h-8 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-600">PMP</div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <Curve topColor="bg-white" bottomColor="#f8fafc" />

                    {/* --- About Section --- */}
                    <section id="about" className="py-24 px-6 bg-slate-50 relative">
                        <div className="max-w-7xl mx-auto reveal">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <div>
                                    <p className="text-indigo-600 font-bold uppercase tracking-[0.2em] text-sm mb-4">The Background</p>
                                    <h2 className="text-4xl md:text-5xl font-extrabold text-slate-900 mb-8 tracking-tight">
                                        27 Years of Enterprise <br/> IT Resilience.
                                    </h2>
                                    <div className="space-y-6 text-lg text-slate-600 leading-relaxed">
                                        <p>
                                            Specializing in bridging the gap between complex technological infrastructures and strategic business objectives. Based in Vancouver, I bring a proven methodology to every engagement.
                                        </p>
                                        <div className="grid grid-cols-2 gap-6 pt-4">
                                            <div>
                                                <p className="text-3xl font-black text-slate-900">27+</p>
                                                <p className="text-sm font-bold text-slate-500 uppercase">Years Exp</p>
                                            </div>
                                            <div>
                                                <p className="text-3xl font-black text-slate-900">100+</p>
                                                <p className="text-sm font-bold text-slate-500 uppercase">Projects</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 gap-6">
                                    {[
                                        { icon: "shield", title: "Cybersecurity Expert", desc: "Hardening enterprise environments against modern vectors." },
                                        { icon: "server", title: "Infra Specialist", desc: "Leading massive cloud and data center transformations." },
                                        { icon: "award", title: "PMP Certified", desc: "Rigorous project controls and stakeholder management." }
                                    ].map((item, idx) => (
                                        <div key={idx} className="bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 flex items-start gap-6 group">
                                            <div className="p-4 rounded-2xl bg-indigo-50 text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                                <Icon name={item.icon} size={28} />
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-900 mb-2">{item.title}</h3>
                                                <p className="text-slate-500">{item.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    <Curve topColor="bg-slate-50" bottomColor="#ffffff" />

                    {/* --- Profile Section --- */}
                    <section id="profile" className="py-24 px-6 bg-white overflow-hidden">
                        <div className="max-w-7xl mx-auto reveal">
                            <div className="text-center mb-20">
                                <h2 className="text-4xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight">Core Expertise</h2>
                                <div className="h-1.5 w-24 bg-indigo-600 mx-auto rounded-full"></div>
                            </div>
                            
                            <div className="grid lg:grid-cols-2 gap-8">
                                <div className="group relative bg-slate-900 rounded-[3rem] p-10 md:p-16 text-white overflow-hidden shadow-2xl">
                                    <div className="absolute top-0 right-0 p-12 opacity-10">
                                        <Icon name="shield" size={200} />
                                    </div>
                                    <div className="relative z-10">
                                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-10 shadow-lg shadow-indigo-500/50">
                                            <Icon name="shield" size={32} />
                                        </div>
                                        <h3 className="text-3xl font-bold mb-6">Cybersecurity Strategy</h3>
                                        <p className="text-slate-400 text-lg mb-10 leading-relaxed">
                                            Designing proactive defense-in-depth frameworks. My approach focuses on threat surface reduction, incident response readiness, and rigorous compliance integration (ISO/SOC2/NIST).
                                        </p>
                                        <div className="flex flex-wrap gap-3">
                                            {['Risk Analysis', 'IAM', 'Network Security', 'Compliance'].map(tag => (
                                                <span key={tag} className="px-4 py-2 rounded-full bg-slate-800 text-slate-300 text-sm font-bold border border-slate-700">{tag}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="group relative bg-indigo-50 rounded-[3rem] p-10 md:p-16 text-slate-900 overflow-hidden shadow-xl border border-indigo-100">
                                    <div className="absolute top-0 right-0 p-12 opacity-5">
                                        <Icon name="server" size={200} />
                                    </div>
                                    <div className="relative z-10">
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mb-10 shadow-lg text-indigo-600">
                                            <Icon name="server" size={32} />
                                        </div>
                                        <h3 className="text-3xl font-bold mb-6">Infrastructure Ops</h3>
                                        <p className="text-slate-600 text-lg mb-10 leading-relaxed">
                                            Executing high-stakes migrations and hybrid-cloud transitions. I specialize in minimizing downtime while maximizing system scalability and ROI for global enterprises.
                                        </p>
                                        <div className="flex flex-wrap gap-3">
                                            {['Cloud Migration', 'Data Center', 'SD-WAN', 'BCP/DR'].map(tag => (
                                                <span key={tag} className="px-4 py-2 rounded-full bg-white text-indigo-600 text-sm font-bold border border-indigo-200">{tag}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* --- Contact Section --- */}
                    <section id="contact" className="pt-24 pb-12 px-6 bg-slate-900 text-white relative">
                        <div className="max-w-7xl mx-auto reveal">
                            <div className="bg-gradient-to-br from-slate-800 to-slate-950 rounded-[4rem] p-12 md:p-24 text-center relative overflow-hidden border border-slate-700/50 shadow-3xl">
                                <div className="absolute -top-24 -left-24 w-64 h-64 bg-indigo-600/20 rounded-full blur-[100px]"></div>
                                <div className="absolute -bottom-24 -right-24 w-64 h-64 bg-blue-600/20 rounded-full blur-[100px]"></div>
                                
                                <div className="relative z-10">
                                    <h2 className="text-4xl md:text-7xl font-black mb-8 leading-tight">
                                        Ready to Build <br/> Secure Foundations?
                                    </h2>
                                    <p className="text-xl text-slate-400 mb-12 max-w-2xl mx-auto">
                                        Currently accepting inquiries for consulting roles and project management leadership across North America and beyond.
                                    </p>
                                    
                                    <div className="flex flex-col sm:flex-row justify-center items-center gap-6">
                                        <a href="mailto:contact@gembaysan.com" className="w-full sm:w-auto bg-white text-slate-900 hover:bg-indigo-50 px-10 py-5 rounded-2xl font-black transition-all flex items-center justify-center gap-3 text-lg shadow-2xl">
                                            <Icon name="mail" size={24} /> contact@gembaysan.com
                                        </a>
                                        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" className="w-full sm:w-auto bg-indigo-600 text-white hover:bg-indigo-500 px-10 py-5 rounded-2xl font-black transition-all flex items-center justify-center gap-3 text-lg shadow-2xl">
                                            <Icon name="linkedin" size={24} /> LinkedIn Profile <Icon name="external-link" size={18} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mt-24 pt-12 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-8 text-slate-500 font-medium font-bold">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-white text-xs font-bold">GB</div>
                                    <span>&copy; {new Date().getFullYear()} Gem Baysan.</span>
                                </div>
                                <div className="text-sm uppercase tracking-widest flex gap-8">
                                    <a href="#about" className="hover:text-white">About</a>
                                    <a href="#profile" className="hover:text-white">Profile</a>
                                    <a href="#home" className="hover:text-white">Top</a>
                                </div>
                                <div className="text-sm">Vancouver, British Columbia</div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
